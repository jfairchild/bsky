on:
  pull_request:
    branches:
      - main
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go environment
        uses: actions/setup-go@v6.3.0
        with:
          go-version-file: ./go.mod
      - name: Go Test Action
        uses: robherley/go-test-action@v0.7.1
        with:
          testArguments: ./...
